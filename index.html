  :root {
    --bg-outer: #F7E9E9;
    --paper: #FDF5F4;
    --panel: #F2DEDD;
    --ink: #3E2A2C;
    --muted: #9C8385;
    --border: #EBD5D3;
    --accent: #C97B84;
    --accent-text: #FDF5F4;
    --coral: #D98FA0;
    --coral-text: #4A222A;
    --spend: #C97462;
    --spend-text: #7A3326;
    --shadow-d-rgb: 168,120,124;
    --shadow-l-rgb: 255,255,255;
  }
  body.dark {
    --bg-outer: #241A1B;
    --paper: #2E2224;
    --panel: #392A2C;
    --ink: #F5E4E3;
    --muted: #C7A8AA;
    --border: #4A3436;
    --accent: #DE95A0;
    --accent-text: #2A1416;
    --coral: #E0A3AC;
    --coral-text: #2A1416;
    --spend: #E0958A;
    --spend-text: #F6C0B5;
    --shadow-d-rgb: 10,7,7;
    --shadow-l-rgb: 90,68,70;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Karla', sans-serif;
    background: var(--bg-outer);
    color: var(--ink);
    height: 100dvh;
    overflow: hidden;
  }
  .page { display: flex; justify-content: center; align-items: stretch; height: 100dvh; padding: 0; }
  .shell {
    width: 100%; max-width: none; height: 100dvh; max-height: 100dvh;
    background: var(--paper); border-radius: 0; overflow: hidden;
    display: flex; flex-direction: column; margin: 0 auto;
  }

  .app-header { display: flex; align-items: center; gap: 10px; padding: calc(16px + env(safe-area-inset-top)) 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo-mark { width: 34px; height: 34px; border-radius: 9px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent-text);
    box-shadow: 3px 3px 7px rgba(var(--shadow-d-rgb),0.3), -3px -3px 7px rgba(var(--shadow-l-rgb),0.5); }
  .app-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 20px; line-height: 1.1; }
  .app-tagline { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 6px; }
  .streak-badge { display: flex; align-items: center; gap: 5px; background: var(--panel); border-radius: 20px; padding: 6px 11px; font-size: 12.5px; font-weight: 600; color: var(--coral-text);
    box-shadow: 3px 3px 7px rgba(var(--shadow-d-rgb),0.25), -3px -3px 7px rgba(var(--shadow-l-rgb),0.7); }
  .icon-toggle-btn { width: 34px; height: 34px; border-radius: 9px; background: var(--panel); border: none; color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 3px 3px 7px rgba(var(--shadow-d-rgb),0.25), -3px -3px 7px rgba(var(--shadow-l-rgb),0.7); }

  .body-scroll { padding: 18px 20px 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }
  .body-scroll::-webkit-scrollbar { width: 6px; }
  .body-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .today-card { background: var(--panel); border-radius: 14px; padding: 18px; margin-bottom: 22px;
    box-shadow: 6px 6px 16px rgba(var(--shadow-d-rgb),0.22), -6px -6px 16px rgba(var(--shadow-l-rgb),0.65); }
  .control-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .date-picker-wrap { position: relative; }
  .date-picker-btn { display: flex; align-items: center; gap: 7px; border: none; border-radius: 10px; padding: 9px 13px; font-family: 'Karla', sans-serif; font-size: 13px; font-weight: 700; color: var(--ink); background: var(--paper); cursor: pointer;
    box-shadow: 4px 4px 9px rgba(var(--shadow-d-rgb),0.24), -4px -4px 9px rgba(var(--shadow-l-rgb),0.7); }
  .date-picker-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.18), inset -2px -2px 4px rgba(255,255,255,0.15); }

  .calendar-panel { position: absolute; top: calc(100% + 8px); left: 0; z-index: 30; background: var(--paper); border-radius: 14px; padding: 14px; width: 250px;
    box-shadow: 8px 8px 18px rgba(var(--shadow-d-rgb),0.32), -6px -6px 14px rgba(var(--shadow-l-rgb),0.6); }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-nav-btn { width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--panel); color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 3px 6px rgba(var(--shadow-d-rgb),0.22), -3px -3px 6px rgba(var(--shadow-l-rgb),0.7); }
  .cal-nav-btn:active { box-shadow: inset 2px 2px 4px rgba(0,0,0,0.18), inset -2px -2px 4px rgba(255,255,255,0.15); }
  .cal-nav-btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; }
  .cal-month-label { font-family: 'Karla', sans-serif; font-weight: 700; font-size: 13px; text-transform: capitalize; }
  .calendar-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 6px; }
  .calendar-dow-row span { text-align: center; font-size: 10px; color: var(--muted); font-weight: 700; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-day { position: relative; aspect-ratio: 1; border: none; border-radius: 8px; background: var(--panel); color: var(--ink); font-family: 'Karla', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; padding: 0;
    box-shadow: 2px 2px 5px rgba(var(--shadow-d-rgb),0.2), -2px -2px 5px rgba(var(--shadow-l-rgb),0.7); }
  .cal-day.today { border: 1.5px solid var(--accent); }
  .cal-day.selected { background: var(--accent); color: var(--accent-text); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2), inset -2px -2px 4px rgba(255,255,255,0.15); }
  .cal-day.disabled { opacity: 0.3; cursor: default; box-shadow: none; background: transparent; }
  .cal-day .cal-dot { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .cal-day.selected .cal-dot { background: var(--accent-text); }
  .cal-day-blank { aspect-ratio: 1; }
  .today-jump-link { display: inline-block; background: transparent; border: none; color: var(--accent); font-family: 'Karla', sans-serif; font-size: 12.5px; font-weight: 700; cursor: pointer; padding: 0; text-decoration: underline; margin-bottom: 12px; }

  .mood-dropdown-wrap { position: relative; }
  .mood-trigger-btn { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--ink); cursor: pointer; padding: 0;
    box-shadow: 3px 3px 7px rgba(var(--shadow-d-rgb),0.24), -3px -3px 7px rgba(var(--shadow-l-rgb),0.7); }
  .mood-dropdown-panel { position: absolute; top: calc(100% + 6px); right: 0; z-index: 30; background: var(--paper); border-radius: 14px; padding: 8px; width: 175px;
    box-shadow: 8px 8px 18px rgba(var(--shadow-d-rgb),0.32), -6px -6px 14px rgba(var(--shadow-l-rgb),0.6); }
  .mood-option-row { display: flex; align-items: center; gap: 10px; width: 100%; background: transparent; border: none; border-radius: 9px; padding: 9px 10px; cursor: pointer; font-family: 'Karla', sans-serif; font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .mood-option-row:active, .mood-option-row.active { background: var(--panel); }
  .mood-option-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }

  .journal-textarea { width: 100%; min-height: 140px; border: none; border-radius: 10px; padding: 14px; font-family: 'AR CENA', 'Handlee', cursive; font-size: 19px; font-weight: 400; line-height: 1.7; background: var(--paper); color: var(--ink); resize: vertical; outline: none;
    box-shadow: 5px 5px 12px rgba(var(--shadow-d-rgb),0.2), -5px -5px 12px rgba(var(--shadow-l-rgb),0.7); }
  .journal-textarea::placeholder { color: var(--muted); font-style: italic; }

  .save-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 10px; }
  .save-status { font-size: 11.5px; color: var(--muted); min-height: 14px; }
  .btn { border: none; border-radius: 9px; padding: 11px 18px; min-height: 44px; font-size: 13.5px; font-weight: 700; font-family: 'Karla', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; flex-shrink: 0;
    box-shadow: 4px 4px 9px rgba(var(--shadow-d-rgb),0.26), -4px -4px 9px rgba(var(--shadow-l-rgb),0.7); }
  .btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2), inset -2px -2px 4px rgba(255,255,255,0.15); }
  .btn-save { background: var(--accent); color: var(--accent-text); }

  .section-heading { font-family: 'Karla', sans-serif; font-weight: 700; font-size: 11.5px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .search-input { width: 100%; border: none; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'Karla', sans-serif; background: var(--panel); color: var(--ink); outline: none; margin-bottom: 16px;
    box-shadow: 4px 4px 9px rgba(var(--shadow-d-rgb),0.2), -4px -4px 9px rgba(var(--shadow-l-rgb),0.7); }
  .search-input::placeholder { color: var(--muted); }

  .entry-card { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; background: var(--panel); border: none; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; font-family: 'Karla', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink);
    box-shadow: 3px 3px 8px rgba(var(--shadow-d-rgb),0.18), -3px -3px 8px rgba(var(--shadow-l-rgb),0.7); }
  .mood-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .entry-card-label { flex: 1; }
  .entry-media-badge { display: flex; color: var(--muted); }
  .entry-card svg:last-child { color: var(--muted); flex-shrink: 0; }

  .media-section { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 4px; }
  .media-thumb-wrap { position: relative; width: 64px; height: 64px; border-radius: 10px; overflow: hidden;
    box-shadow: 3px 3px 7px rgba(var(--shadow-d-rgb),0.24), -3px -3px 7px rgba(var(--shadow-l-rgb),0.7); }
  .media-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
  .media-video-thumb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--panel); color: var(--muted); }
  .media-remove-btn { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .media-add-btn { width: 64px; height: 64px; border-radius: 10px; background: var(--panel); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 3px 3px 7px rgba(var(--shadow-d-rgb),0.22), -3px -3px 7px rgba(var(--shadow-l-rgb),0.7); }

  .empty-state { text-align: center; padding: 30px 12px; }
  .empty-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; margin-bottom: 4px; }
  .empty-sub { font-size: 13px; color: var(--muted); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(40,34,24,0.4); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .modal { background: var(--paper); border-radius: 14px; width: 100%; max-width: 420px; max-height: 88vh; overflow-y: auto; padding: 20px;
    box-shadow: 8px 8px 20px rgba(var(--shadow-d-rgb),0.3), -6px -6px 16px rgba(var(--shadow-l-rgb),0.5); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 19px; }
  .close-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; }
  .error-banner { background: #F3D8D2; color: #8A3F32; font-size: 12.5px; padding: 9px 11px; border-radius: 8px; margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; position: sticky; bottom: -20px; background: var(--paper); padding: 10px 0 20px; margin-bottom: -20px; }
  .btn-cancel { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 9px; padding: 11px 8px; font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer; }
  .btn-danger { background: var(--spend); color: #fff; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div class="page">
  <div class="shell">
    <div class="app-header">
      <div class="logo-mark" id="icon-logo"></div>
      <div style="flex:1;">
        <div class="app-name">Detik</div>
        <div class="app-tagline">tulis, simpan, kenang semula</div>
      </div>
      <div class="header-right">
        <div class="streak-badge" id="streak-badge"></div>
        <button class="icon-toggle-btn" id="backup-btn" onclick="openBackupModal()"></button>
        <button class="icon-toggle-btn" id="dark-toggle" onclick="toggleDarkMode()"></button>
      </div>
    </div>
    <div class="body-scroll" id="bodyRoot"></div>
  </div>
</div>
<div id="modalRoot"></div>

<script>
  // ---------- icons ----------
  const ICON_PATHS = {
    book: '<path d="M4 5c2.2-1.1 5.2-1.1 7 .6v13c-1.8-1.7-4.8-1.7-7-.6V5z"/><path d="M20 5c-2.2-1.1-5.2-1.1-7 .6v13c1.8-1.7 4.8-1.7 7-.6V5z"/>',
    flame: '<path d="M12 2c1 3-3 4-3 8a3 3 0 0 0 6 0c1 1 2 3 2 5a5 5 0 0 1-10 0c0-4 3-5 5-13z"/>',
    moon: '<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/>',
    sun: '<circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2.5 12H5M19 12h2.5M4.2 19.8L6 18M18 6l1.8-1.8"/>',
    x: '<path d="M18 6L6 18M6 6l12 12"/>',
    check: '<path d="M5 12l5 5L19 7"/>',
    trash: '<path d="M4 6h16M9 6V4h6v2M6 6l1 14h10l1-14"/>',
    search: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
    cloud: '<path d="M7 18a4 4 0 0 1-.5-7.97A5 5 0 0 1 16.9 8.1 4.5 4.5 0 0 1 17 17H7z"/><path d="M12 12v6M9.5 15.5L12 18l2.5-2.5"/>',
    calendar: '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/>',
    chevronLeft: '<path d="M15 5l-7 7 7 7"/>',
    chevronRight: '<path d="M9 5l7 7-7 7"/>',
    image: '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
    video: '<rect x="2" y="5" width="15" height="14" rx="2"/><path d="M17 10l5-3v10l-5-3"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    playCircle: '<circle cx="12" cy="12" r="9"/><path d="M10 8.3l6.5 3.7-6.5 3.7V8.3z" fill="currentColor" stroke="none"/>',
    loader: '<circle cx="12" cy="12" r="9" stroke-dasharray="34 20" stroke-linecap="round"/>',
  };
  function icon(name, size, extraClass) {
    size = size || 16; extraClass = extraClass || '';
    return '<svg class="' + extraClass + '" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + ICON_PATHS[name] + '</svg>';
  }

  const MOODS = [
    { key: 'Gembira', color: '#F4C77A' },
    { key: 'Tenang', color: '#A8CFC3' },
    { key: 'Biasa', color: '#E3DCC9' },
    { key: 'Sedih', color: '#A9BFD9' },
    { key: 'Cemas', color: '#E3A6A0' },
  ];
  function moodColor(key) {
    const m = MOODS.find(x => x.key === key);
    return m ? m.color : '#E3DCC9';
  }

  function escapeHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function dateToLocalStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }
  function todayStr() { return dateToLocalStr(new Date()); }

  function formatLongDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  function formatShortDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('ms-MY', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  // ---------- storage shim ----------
  // window.storage only exists inside the Claude.ai artifact preview (cloud,
  // tied to the user's account). When this file is hosted/opened standalone,
  // fall back to localStorage so entries still save on-device.
  const hasArtifactStorage = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

  async function storageGet(key) {
    if (hasArtifactStorage) {
      try { return await window.storage.get(key, false); } catch (e) { return null; }
    }
    try {
      const raw = localStorage.getItem('jurnal_' + key);
      return raw === null ? null : { key: key, value: raw };
    } catch (e) { return null; }
  }
  async function storageSet(key, value) {
    if (hasArtifactStorage) {
      try { return await window.storage.set(key, value, false); } catch (e) { return null; }
    }
    try {
      localStorage.setItem('jurnal_' + key, value);
      return { key: key, value: value };
    } catch (e) { return null; }
  }

  // ---------- state ----------
  let state = { loaded: false, entries: [], darkMode: false };
  let currentMood = 'Biasa';
  let editingEntryId = null;
  let saveTimer = null;
  let todayStatusMessage = '';
  let selectedEntryDate = todayStr();

  async function loadData() {
    try {
      const [e, s] = await Promise.allSettled([storageGet('entries'), storageGet('settings')]);
      if (e.status === 'fulfilled' && e.value) state.entries = JSON.parse(e.value.value);
      if (s.status === 'fulfilled' && s.value) state.darkMode = !!JSON.parse(s.value.value).darkMode;
    } catch (err) { /* no data yet */ }
    state.loaded = true;
    render();
  }
  async function persistEntries() {
    try { await storageSet('entries', JSON.stringify(state.entries)); }
    catch (e) { console.error('Gagal simpan jurnal', e); }
  }
  async function persistSettings() {
    try { await storageSet('settings', JSON.stringify({ darkMode: state.darkMode })); }
    catch (e) { console.error('Gagal simpan tetapan', e); }
  }

  function toggleDarkMode() {
    state.darkMode = !state.darkMode;
    applyTheme();
    persistSettings();
  }
  function applyTheme() {
    document.body.classList.toggle('dark', state.darkMode);
    document.getElementById('dark-toggle').innerHTML = icon(state.darkMode ? 'sun' : 'moon', 16);
    document.getElementById('theme-color-meta').setAttribute('content', state.darkMode ? '#241A1B' : '#F7E9E9');
  }

  function computeStreak() {
    const datesSet = new Set(state.entries.map(e => e.date));
    let streak = 0;
    let cursor = new Date();
    if (!datesSet.has(todayStr())) cursor.setDate(cursor.getDate() - 1);
    while (datesSet.has(dateToLocalStr(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  // ---------- render ----------
  function render() {
    applyTheme();
    document.getElementById('icon-logo').innerHTML = icon('book', 18);
    document.getElementById('backup-btn').innerHTML = icon('cloud', 16);
    const streak = computeStreak();
    document.getElementById('streak-badge').innerHTML = icon('flame', 14) + streak + ' hari';

    const root = document.getElementById('bodyRoot');
    root.innerHTML = renderMain();

    root.scrollTop = 0;
    root.style.display = 'none';
    void root.offsetHeight;
    root.style.display = '';
  }

  function renderMain() {
    const today = todayStr();
    const entryDate = selectedEntryDate;
    const entryForDate = state.entries.find(e => e.date === entryDate);
    currentMood = entryForDate ? entryForDate.mood : (currentMood || 'Biasa');
    const entryText = entryForDate ? entryForDate.text : '';
    mediaDrafts.today = entryForDate && Array.isArray(entryForDate.media) ? entryForDate.media.slice() : [];

    let html = '';
    html += '<div class="today-card">';
    html += '  <div class="control-row">';
    html += '    <div class="date-picker-wrap">';
    html += '      <button type="button" class="date-picker-btn" onclick="toggleCalendar(event)">' + icon('calendar', 14) + formatShortDate(entryDate) + '</button>';
    if (calendarOpen) html += renderCalendarPanel();
    html += '    </div>';
    html += '    <div class="mood-dropdown-wrap" id="mood-dropdown-wrap">';
    html += '      <button type="button" class="mood-trigger-btn" id="mood-trigger-btn" style="background:' + moodColor(currentMood) + ';" title="' + currentMood + '" aria-label="Mood: ' + currentMood + '" onclick="toggleMoodDropdown(event)"></button>';
    html += '    </div>';
    html += '  </div>';
    if (entryDate !== today) html += '<button type="button" class="today-jump-link" onclick="changeEntryDate(\'' + today + '\')">Kembali ke hari ini</button>';
    html += '  <textarea class="journal-textarea" id="today-text" placeholder="Apa yang berlaku pada hari ini? Bagaimana perasaan anda?">' + escapeHtml(entryText) + '</textarea>';
    html += renderMediaSection(mediaDrafts.today, 'today');
    html += '  <div id="today-error"></div>';
    html += '  <div class="save-row"><span class="save-status" id="today-status">' + escapeHtml(todayStatusMessage) + '</span><button class="btn btn-save" onclick="saveTodayEntry()">' + icon('check', 15) + (entryForDate ? 'Kemas kini' : 'Simpan') + '</button></div>';
    html += '</div>';

    const pastEntries = state.entries.filter(e => e.date !== entryDate).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    html += '<div class="section-heading">Sejarah jurnal</div>';
    html += '<input class="search-input" id="search-input" type="text" placeholder="Cari dalam jurnal lama..." oninput="renderHistoryList()">';
    html += '<div id="history-list">' + buildHistoryListHtml(pastEntries, '') + '</div>';
    return html;
  }

  function changeEntryDate(newDate) {
    if (!newDate) return;
    selectedEntryDate = newDate;
    calendarOpen = false;
    todayStatusMessage = '';
    render();
  }

  // ---------- custom calendar ----------
  let calendarOpen = false;
  let calendarViewMonth = selectedEntryDate.slice(0, 7);

  function toggleCalendar(e) {
    if (e) e.stopPropagation();
    calendarOpen = !calendarOpen;
    if (calendarOpen) calendarViewMonth = selectedEntryDate.slice(0, 7);
    render();
  }

  function calendarPrevMonth(e) {
    if (e) e.stopPropagation();
    const [y, m] = calendarViewMonth.split('-').map(Number);
    const d = new Date(y, m - 2, 1);
    calendarViewMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    render();
  }

  function calendarNextMonth(e) {
    if (e) e.stopPropagation();
    const [y, m] = calendarViewMonth.split('-').map(Number);
    const d = new Date(y, m, 1);
    const candidate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (candidate > todayStr().slice(0, 7)) return;
    calendarViewMonth = candidate;
    render();
  }

  function pickCalendarDate(dateStr, e) {
    if (e) e.stopPropagation();
    if (dateStr > todayStr()) return;
    changeEntryDate(dateStr);
  }

  function renderCalendarPanel() {
    const [y, m] = calendarViewMonth.split('-').map(Number);
    const firstOfMonth = new Date(y, m - 1, 1);
    const startWeekday = firstOfMonth.getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    const monthLabel = firstOfMonth.toLocaleDateString('ms-MY', { month: 'long', year: 'numeric' });
    const today = todayStr();
    const isTodayMonth = calendarViewMonth === today.slice(0, 7);
    const entryDatesSet = new Set(state.entries.map(e => e.date));

    let html = '<div class="calendar-panel" onclick="event.stopPropagation()">';
    html += '<div class="calendar-header"><button type="button" class="cal-nav-btn" onclick="calendarPrevMonth(event)">' + icon('chevronLeft', 14) + '</button><span class="cal-month-label">' + monthLabel + '</span><button type="button" class="cal-nav-btn" ' + (isTodayMonth ? 'disabled' : '') + ' onclick="calendarNextMonth(event)">' + icon('chevronRight', 14) + '</button></div>';
    html += '<div class="calendar-dow-row">';
    ['A', 'I', 'S', 'R', 'K', 'J', 'S'].forEach(d => { html += '<span>' + d + '</span>'; });
    html += '</div>';
    html += '<div class="calendar-grid">';
    for (let i = 0; i < startWeekday; i++) html += '<span class="cal-day-blank"></span>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const isFuture = dateStr > today;
      const isSelected = dateStr === selectedEntryDate;
      const isToday = dateStr === today;
      const hasEntry = entryDatesSet.has(dateStr);
      html += '<button type="button" class="cal-day' + (isSelected ? ' selected' : '') + (isToday ? ' today' : '') + (isFuture ? ' disabled' : '') + '" ' + (isFuture ? 'disabled' : '') + ' onclick="pickCalendarDate(\'' + dateStr + '\', event)">' + d + (hasEntry ? '<span class="cal-dot"></span>' : '') + '</button>';
    }
    html += '</div></div>';
    return html;
  }

  document.addEventListener('click', function (e) {
    if (calendarOpen && !e.target.closest('.date-picker-wrap')) {
      calendarOpen = false;
      render();
    }
    if (!e.target.closest('.mood-dropdown-wrap')) {
      document.querySelectorAll('.mood-dropdown-panel').forEach(p => p.remove());
    }
  });

  function formatMediumDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function buildHistoryListHtml(entries, query) {
    const q = (query || '').toLowerCase().trim();
    const filtered = q ? entries.filter(e => e.text.toLowerCase().includes(q) || e.mood.toLowerCase().includes(q)) : entries;
    if (filtered.length === 0) {
      return '<div class="empty-state"><div class="empty-title">' + (entries.length === 0 ? 'Belum ada jurnal lama' : 'Tiada padanan carian') + '</div><div class="empty-sub">' + (entries.length === 0 ? 'Mula tulis jurnal hari ini di atas.' : 'Cuba kata kunci lain.') + '</div></div>';
    }
    let html = '';
    filtered.forEach(e => {
      const hasMedia = Array.isArray(e.media) && e.media.length > 0;
      html += '<button type="button" class="entry-card" onclick="openEntryModal(\'' + e.id + '\')">';
      html += '<div class="mood-dot" style="background:' + moodColor(e.mood) + ';"></div>';
      html += '<span class="entry-card-label">Entri ' + formatMediumDate(e.date) + '</span>';
      if (hasMedia) html += '<span class="entry-media-badge">' + icon('image', 13) + '</span>';
      html += icon('chevronRight', 15);
      html += '</button>';
    });
    return html;
  }

  function renderHistoryList() {
    const today = todayStr();
    const pastEntries = state.entries.filter(e => e.date !== today).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    const query = document.getElementById('search-input').value;
    document.getElementById('history-list').innerHTML = buildHistoryListHtml(pastEntries, query);
  }

  function renderMoodOptionsHtml(activeKey, pickFnName) {
    let html = '';
    MOODS.forEach(m => {
      html += '<button type="button" class="mood-option-row' + (activeKey === m.key ? ' active' : '') + '" onclick="' + pickFnName + '(\'' + m.key + '\')"><span class="mood-option-dot" style="background:' + m.color + ';"></span>' + m.key + '</button>';
    });
    return html;
  }

  // ---------- media attachments (photo/video) ----------
  const MAX_VIDEO_BYTES = 3 * 1024 * 1024; // 3MB — storage is shared across all entries, so keep clips short
  let mediaDrafts = { today: [], modal: [] };

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function compressImageFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function () {
        const img = new Image();
        img.onload = function () {
          const maxDim = 1000;
          let w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function processMediaFile(file) {
    const isImage = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');
    if (!isImage && !isVideo) return { error: 'Jenis fail tidak disokong \u2014 guna gambar atau video sahaja.' };
    if (isVideo && file.size > MAX_VIDEO_BYTES) {
      return { error: 'Video terlalu besar (' + (file.size / 1024 / 1024).toFixed(1) + 'MB). Guna klip pendek di bawah 3MB.' };
    }
    try {
      if (isImage) {
        const dataUrl = await compressImageFile(file);
        return { type: 'image', dataUrl: dataUrl, name: file.name };
      } else {
        const dataUrl = await fileToDataUrl(file);
        return { type: 'video', dataUrl: dataUrl, name: file.name };
      }
    } catch (err) {
      return { error: 'Tak dapat proses fail ini.' };
    }
  }

  function renderMediaSection(mediaArray, keyPrefix) {
    let html = '<div class="media-section" id="' + keyPrefix + '-media-section">';
    mediaArray.forEach((m, idx) => {
      html += '<div class="media-thumb-wrap">';
      if (m.type === 'image') html += '<img class="media-thumb" src="' + m.dataUrl + '" alt="Lampiran">';
      else html += '<div class="media-thumb media-video-thumb">' + icon('playCircle', 26) + '</div>';
      html += '<button type="button" class="media-remove-btn" onclick="removeMedia(\'' + keyPrefix + '\',' + idx + ')" aria-label="Buang lampiran">' + icon('x', 11) + '</button>';
      html += '</div>';
    });
    html += '<label class="media-add-btn" title="Tambah gambar/video">' + icon('plus', 18) + '<input type="file" accept="image/*,video/*" style="display:none;" onchange="handleMediaFile(event, \'' + keyPrefix + '\')"></label>';
    html += '</div>';
    html += '<div id="' + keyPrefix + '-media-error"></div>';
    return html;
  }

  function rerenderMediaSection(keyPrefix) {
    const el = document.getElementById(keyPrefix + '-media-section');
    if (el) el.outerHTML = renderMediaSection(mediaDrafts[keyPrefix], keyPrefix);
  }

  async function handleMediaFile(e, keyPrefix) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const errEl = document.getElementById(keyPrefix + '-media-error');
    if (errEl) errEl.innerHTML = '';
    const result = await processMediaFile(file);
    if (result.error) {
      if (errEl) errEl.innerHTML = '<div class="error-banner">' + escapeHtml(result.error) + '</div>';
      return;
    }
    mediaDrafts[keyPrefix].push(result);
    rerenderMediaSection(keyPrefix);
  }

  function removeMedia(keyPrefix, idx) {
    mediaDrafts[keyPrefix].splice(idx, 1);
    rerenderMediaSection(keyPrefix);
  }

  function toggleMoodDropdown(e) {
    if (e) e.stopPropagation();
    const wrap = document.getElementById('mood-dropdown-wrap');
    const existing = wrap.querySelector('.mood-dropdown-panel');
    if (existing) { existing.remove(); return; }
    const panel = document.createElement('div');
    panel.className = 'mood-dropdown-panel';
    panel.onclick = function (ev) { ev.stopPropagation(); };
    panel.innerHTML = renderMoodOptionsHtml(currentMood, 'setTodayMood');
    wrap.appendChild(panel);
  }

  function setTodayMood(key) {
    currentMood = key;
    const trigger = document.getElementById('mood-trigger-btn');
    if (trigger) {
      trigger.style.background = moodColor(key);
      trigger.title = key;
      trigger.setAttribute('aria-label', 'Mood: ' + key);
    }
    const wrap = document.getElementById('mood-dropdown-wrap');
    const panel = wrap ? wrap.querySelector('.mood-dropdown-panel') : null;
    if (panel) panel.remove();
  }

  function saveTodayEntry() {
    const text = document.getElementById('today-text').value;
    if (!text.trim()) {
      document.getElementById('today-error').innerHTML = '<div class="error-banner">Tulis sesuatu dulu sebelum simpan.</div>';
      return;
    }
    document.getElementById('today-error').innerHTML = '';
    const entryDate = selectedEntryDate;
    const idx = state.entries.findIndex(e => e.date === entryDate);
    if (idx !== -1) {
      state.entries[idx] = Object.assign({}, state.entries[idx], { mood: currentMood, text: text, media: mediaDrafts.today, updatedAt: Date.now() });
    } else {
      state.entries.unshift({ id: uid(), date: entryDate, mood: currentMood, text: text, media: mediaDrafts.today, createdAt: Date.now(), updatedAt: Date.now() });
    }
    persistEntries();
    todayStatusMessage = '\u2713 Disimpan';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      todayStatusMessage = '';
      const el = document.getElementById('today-status');
      if (el) el.textContent = '';
    }, 2500);
    render();
  }

  // ---------- past entry modal ----------
  function openEntryModal(id) {
    const e = state.entries.find(x => x.id === id);
    if (!e) return;
    editingEntryId = id;
    mediaDrafts.modal = Array.isArray(e.media) ? e.media.slice() : [];
    let html = '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">';
    html += '<div class="modal-header"><span class="modal-title">' + formatLongDate(e.date) + '</span><button class="close-btn" onclick="closeModal()">' + icon('x', 18) + '</button></div>';
    html += '<div id="modal-error"></div>';
    html += '<div class="mood-dropdown-wrap" id="modal-mood-dropdown-wrap"><button type="button" class="mood-trigger-btn" id="modal-mood-trigger-btn" style="background:' + moodColor(e.mood) + ';" title="' + e.mood + '" aria-label="Mood: ' + e.mood + '" onclick="toggleModalMoodDropdown(event)"></button></div>';
    html += '<textarea class="journal-textarea" id="modal-text">' + escapeHtml(e.text) + '</textarea>';
    html += renderMediaSection(mediaDrafts.modal, 'modal');
    html += '<div class="modal-actions"><button type="button" class="btn-cancel" onclick="deleteEntry(\'' + id + '\')" style="color:var(--spend-text);">' + icon('trash', 14) + ' Padam</button><button type="button" class="btn btn-save" style="flex:1;" onclick="saveEntryModal()">' + icon('check', 15) + 'Kemas kini</button></div>';
    html += '</div></div>';
    document.getElementById('modalRoot').innerHTML = html;
    modalMoodValue = e.mood;
  }
  let modalMoodValue = 'Biasa';

  function toggleModalMoodDropdown(e) {
    if (e) e.stopPropagation();
    const wrap = document.getElementById('modal-mood-dropdown-wrap');
    const existing = wrap.querySelector('.mood-dropdown-panel');
    if (existing) { existing.remove(); return; }
    const panel = document.createElement('div');
    panel.className = 'mood-dropdown-panel';
    panel.onclick = function (ev) { ev.stopPropagation(); };
    panel.innerHTML = renderMoodOptionsHtml(modalMoodValue, 'setModalMood');
    wrap.appendChild(panel);
  }

  function setModalMood(key) {
    modalMoodValue = key;
    const trigger = document.getElementById('modal-mood-trigger-btn');
    if (trigger) {
      trigger.style.background = moodColor(key);
      trigger.title = key;
      trigger.setAttribute('aria-label', 'Mood: ' + key);
    }
    const wrap = document.getElementById('modal-mood-dropdown-wrap');
    const panel = wrap ? wrap.querySelector('.mood-dropdown-panel') : null;
    if (panel) panel.remove();
  }
  function saveEntryModal() {
    const text = document.getElementById('modal-text').value;
    if (!text.trim()) {
      document.getElementById('modal-error').innerHTML = '<div class="error-banner">Tulis sesuatu dulu sebelum simpan.</div>';
      return;
    }
    const idx = state.entries.findIndex(x => x.id === editingEntryId);
    if (idx !== -1) state.entries[idx] = Object.assign({}, state.entries[idx], { mood: modalMoodValue, text: text, media: mediaDrafts.modal, updatedAt: Date.now() });
    persistEntries();
    closeModal();
    render();
  }
  function deleteEntry(id) {
    let html = '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">';
    html += '<div class="modal-header"><span class="modal-title">Padam catatan?</span><button class="close-btn" onclick="closeModal()">' + icon('x', 18) + '</button></div>';
    html += '<div style="font-size:13.5px;color:var(--muted);margin-bottom:6px;">Tindakan ini tidak boleh dibatalkan.</div>';
    html += '<div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Batal</button><button type="button" class="btn btn-danger" style="flex:1;" onclick="performDeleteEntry(\'' + id + '\')">' + icon('trash', 15) + 'Padam</button></div>';
    html += '</div></div>';
    document.getElementById('modalRoot').innerHTML = html;
  }
  function performDeleteEntry(id) {
    state.entries = state.entries.filter(x => x.id !== id);
    persistEntries();
    closeModal();
    render();
  }
  function closeModal(e) {
    if (e) e.stopPropagation();
    editingEntryId = null;
    document.getElementById('modalRoot').innerHTML = '';
  }

  // ---------- BACKUP / RESTORE ----------
  function openBackupModal() {
    let html = '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">';
    html += '<div class="modal-header"><span class="modal-title">Sandaran &amp; Pulih</span><button class="close-btn" onclick="closeModal()">' + icon('x', 18) + '</button></div>';
    html += '<div class="error-banner">App ni simpan jurnal terus (secara automatik) bila dibuka dalam pratonton Claude. Untuk simpan salinan ke iCloud Drive atau pindah ke peranti lain, muat turun fail sandaran di bawah \u2014 bila tetingkap simpan iOS muncul, pilih "Save to Files" &gt; iCloud Drive.</div>';
    html += '<div style="display:flex;flex-direction:column;gap:10px;">';
    html += '<button class="btn btn-save" style="width:100%;" onclick="exportBackup()">' + icon('cloud', 15) + 'Muat turun sandaran (.json)</button>';
    html += '<label class="btn" style="width:100%;background:var(--panel);color:var(--ink);box-shadow:4px 4px 9px rgba(var(--shadow-d-rgb),0.26), -4px -4px 9px rgba(var(--shadow-l-rgb),0.7);">' + icon('check', 15) + 'Pulihkan dari fail sandaran<input type="file" accept="application/json" style="display:none;" onchange="importBackup(event)"></label>';
    html += '</div>';
    html += '<div id="backup-status" class="save-status" style="margin-top:10px;"></div>';
    html += '</div></div>';
    document.getElementById('modalRoot').innerHTML = html;
  }

  function exportBackup() {
    try {
      const payload = { app: 'de-tik', exportedAt: new Date().toISOString(), entries: state.entries };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'de-tik-sandaran-' + todayStr() + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      document.getElementById('backup-status').textContent = '\u2713 Fail sandaran dimuat turun.';
    } catch (err) {
      document.getElementById('backup-status').textContent = 'Muat turun gagal: ' + err.message;
    }
  }

  function importBackup(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () {
      try {
        const payload = JSON.parse(reader.result);
        if (!payload || !Array.isArray(payload.entries)) throw new Error('Format fail tidak sah');
        openImportConfirm(payload.entries);
      } catch (err) {
        document.getElementById('backup-status').textContent = 'Fail tidak sah atau rosak.';
      }
    };
    reader.readAsText(file);
  }

  function openImportConfirm(importedEntries) {
    let html = '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">';
    html += '<div class="modal-header"><span class="modal-title">Pulihkan sandaran?</span><button class="close-btn" onclick="closeModal()">' + icon('x', 18) + '</button></div>';
    html += '<div style="font-size:13.5px;color:var(--muted);margin-bottom:6px;">Fail ni ada ' + importedEntries.length + ' catatan. Catatan yang bertindih tarikh dengan yang sedia ada akan digabung (fail sandaran diutamakan). Teruskan?</div>';
    html += '<div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Batal</button><button type="button" class="btn btn-save" style="flex:1;" onclick="performImport()">' + icon('check', 15) + 'Pulihkan</button></div>';
    html += '</div></div>';
    window._pendingImportEntries = importedEntries;
    document.getElementById('modalRoot').innerHTML = html;
  }

  function performImport() {
    const importedEntries = window._pendingImportEntries || [];
    const byDate = {};
    state.entries.forEach(e => { byDate[e.date] = e; });
    importedEntries.forEach(e => { if (e && e.date) byDate[e.date] = Object.assign({ id: e.id || uid() }, e); });
    state.entries = Object.values(byDate);
    persistEntries();
    window._pendingImportEntries = null;
    closeModal();
    render();
  }

  loadData();
</script>

</body>
